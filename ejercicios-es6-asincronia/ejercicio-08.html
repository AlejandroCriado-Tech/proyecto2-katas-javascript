<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game of Thrones Characters</title>
    <script src="ejercicio-08.js" defer></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: #0e0e0e;
            color: #d4af37;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 10px;
        }

        select {
            background: #1a1a1a;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 10px 16px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 30px;
            min-width: 240px;
        }

        .character-image {
            width: 300px;
            height: 380px;
            object-fit: cover;
            border: 3px solid #d4af37;
            border-radius: 6px;
            display: block;
        }
    </style>
</head>
<body>
    <h1>Game of Thrones</h1>
    <select id="character-list"></select>
    <div>
        <img class="character-image" alt="Personaje">
    </div>
</body>
</html>
