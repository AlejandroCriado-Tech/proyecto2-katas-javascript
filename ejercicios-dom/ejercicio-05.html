<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metal Albums</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
        }

        header {
            background: #1a1a1a;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #c0392b;
        }

        header h1 {
            color: #c0392b;
            font-size: 2.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        header p {
            color: #888;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        main {
            max-width: 700px;
            margin: 50px auto;
            padding: 0 20px;
        }

        main h2 {
            color: #c0392b;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 24px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        li {
            background: #1a1a1a;
            border-left: 4px solid #c0392b;
            padding: 18px 24px;
            border-radius: 4px;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            transition: transform 0.2s, background 0.2s;
            cursor: default;
        }

        li:hover {
            transform: translateX(8px);
            background: #222;
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            color: #555;
            font-size: 0.85rem;
            border-top: 1px solid #1a1a1a;
            margin-top: 60px;
        }
    </style>
    <script src="ejercicio-05.js" defer></script>
</head>
<body>
    <header>
        <h1>Metal Albums</h1>
        <p>Los discos más icónicos del metal</p>
    </header>
    <main>
        <h2>Discografía</h2>
        <div id="app"></div>
    </main>
    <footer>
        <p>&copy; 2024 Metal Archives — Todos los derechos reservados</p>
    </footer>
</body>
</html>
